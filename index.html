<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Position Predictor - TensorFlow.js</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="root"></div>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Data -->
    <script src="js/data/characteristics.js"></script>
    <script src="js/data/formations.js"></script>
    <script src="js/data/trainingData.js"></script>

    <!-- Model -->
    <script src="js/model/encoder.js"></script>
    <script src="js/model/footballModel.js"></script>

    <!-- React Components -->
    <script type="text/babel" src="js/components/LoadingOverlay.jsx"></script>
    <script type="text/babel" src="js/components/Header.jsx"></script>
    <script type="text/babel" src="js/components/FormationSelector.jsx"></script>
    <script type="text/babel" src="js/components/CharacteristicsInput.jsx"></script>
    <script type="text/babel" src="js/components/PredictionResults.jsx"></script>
    <script type="text/babel" src="js/components/FieldVisualization.jsx"></script>
    <script type="text/babel" src="js/app.jsx"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
